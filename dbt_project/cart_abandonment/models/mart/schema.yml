version: 2

models:
  - name: mart_funnel
    description: "Session-level funnel showing deepest stage each session reached"
    columns:
      - name: session_id
        tests:
          - not_null
          - unique
      - name: funnel_stage
        tests:
          - not_null
          - accepted_values:
              values: ['1_page_view', '2_view_item', '3_add_to_cart', '4_checkout', '5_purchase']
